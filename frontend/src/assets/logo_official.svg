<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Dark Background -->
  <rect width="200" height="60" fill="#030712" rx="12"/>
  
  <!-- The Sovereign Arrow (Extracted from Logo.jsx) -->
  <g transform="translate(15, 10)">
    {/* Boundary ring */}
    <path 
      d="M 23.07 8.93 A 10 10 0 1 0 26 16" 
      fill="none" 
      stroke="white" 
      stroke-opacity="0.2"
      stroke-width="3" 
      stroke-linecap="round" 
    />
    {/* Central Origin Node */}
    <circle cx="16" cy="16" r="2" fill="white" />
    {/* Primary Arrow Shooting Beyond */}
    <g stroke="#00E5FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 10 22 L 24 8" />
      <path d="M 16 8 L 24 8 L 24 16" />
    </g>
  </g>

  <!-- Official Typography -->
  <text x="65" y="40" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="white" letter-spacing="-1.5">BYND</text>
</svg>
